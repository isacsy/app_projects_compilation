name: Update News Dashboard

on:
  schedule:
    - cron: "0 */3 * * *" # every 3 hours
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch news
        run: python3 news-dashboard/scripts/fetch_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- news-dashboard/docs/data/news.json; then
            git add news-dashboard/docs/data/news.json
            git commit -m "chore: refresh news dashboard feed"
            git push
          else
            echo "No news changes to commit."
          fi
